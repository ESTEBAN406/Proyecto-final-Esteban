<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Scanner</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #0f172a, #1e293b);
    color: #e2e8f0;
}

.container {
    max-width: 1000px;
    margin: auto;
    padding: 20px;
}

.card {
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(10px);
    border-radius: 15px;
    padding: 20px;
    margin-bottom: 20px;
}

input, select, button {
    padding: 10px;
    border-radius: 8px;
    border: none;
    margin-top: 10px;
}

input, select { width: 100%; }

button {
    background: #22c55e;
    color: white;
    cursor: pointer;
}
button:hover { background: #16a34a; }

#terminal {
    background: black;
    color: #00ff9c;
    padding: 15px;
    height: 180px;
    overflow-y: auto;
    border-radius: 10px;
    font-family: monospace;
}

.bar {
    height: 20px;
    border-radius: 10px;
    background: #334155;
    margin-top: 10px;
}

.fill {
    height: 100%;
    border-radius: 10px;
    width: 0%;
    transition: 0.5s;
}

.low { background: #22c55e; }
.medium { background: #eab308; }
.high { background: #ef4444; }

h1 { text-align: center; }
</style>
</head>

<body>

<div class="container">

<h1>🔐 Scanner de vulnerabilidades educativo</h1>

<div class="card">
    <label>Seleccionar objetivo:</label>
    <select id="objetivo">
        <option>Banco Andino</option>
        <option>Financiera Global</option>
        <option>Banco Capital Secure</option>
        <option>TrustBank Corp</option>
        <option>NeoBank Digital</option>
    </select>

    <input type="text" id="custom" placeholder="Escribe otro objetivo..." style="display:none;">

    <button onclick="scan()">Iniciar Escaneo</button>
    <button onclick="pdf()">Exportar PDF</button>
</div>

<div class="card">
    <h3>💻 Terminal</h3>
    <div id="terminal"></div>
</div>

<div class="card">
    <h3>📊 Nivel de Riesgo</h3>
    <div class="bar"><div id="riskBar" class="fill"></div></div>
</div>

<div class="card">
    <h3>🧾 Reporte</h3>
    <div id="reporte"></div>
</div>

</div>

<script>
let term = document.getElementById("terminal");
let reporteData = null;
let riskValue = 0;

const selector = document.getElementById("objetivo");
const customInput = document.getElementById("custom");

selector.addEventListener("change", () => {
    customInput.style.display = (selector.value === "custom") ? "block" : "none";
});

function log(t){
    term.innerHTML += t + "<br>";
    term.scrollTop = term.scrollHeight;
}

function sleep(ms){ return new Promise(r => setTimeout(r, ms)); }

const posiblesVulns = [
    {nombre:"SQL Injection", riesgo:3},
    {nombre:"XSS", riesgo:2},
    {nombre:"CSRF", riesgo:2},
    {nombre:"Open Ports", riesgo:1},
    {nombre:"Weak Passwords", riesgo:3},
    {nombre:"Outdated Software", riesgo:3},
    {nombre:"Insecure Headers", riesgo:2},
    {nombre:"Directory Listing Enabled", riesgo:2}
];

function getRandomVulns() {
    let cantidad = Math.floor(Math.random() * 4) + 2;
    let mezcladas = [...posiblesVulns].sort(() => 0.5 - Math.random());
    return mezcladas.slice(0, cantidad);
}

async function scan(){
    term.innerHTML = "";

    let obj = (selector.value === "custom") ? customInput.value : selector.value;

    log("Inicializando escaneo...");
    await sleep(600);

    log("Resolviendo DNS...");
    await sleep(600);

    log("Escaneando puertos...");
    await sleep(800);

    log("Analizando servicios...");
    await sleep(800);

    log("Buscando vulnerabilidades...");
    await sleep(1000);

    let vulns = getRandomVulns();
    let total = 0;

    log("Resultados:");

    vulns.forEach(v=>{
        log("[!] " + v.nombre);
        total += v.riesgo;
    });

    riskValue = Math.min(total * 10, 100);
    actualizarBarra();

    let nivel = "BAJO";
    if(riskValue > 40) nivel = "MEDIO";
    if(riskValue > 70) nivel = "ALTO";

    reporteData = {
        objetivo: obj,
        vulnerabilidades: vulns,
        riesgo: riskValue,
        nivel: nivel,
        fecha: new Date().toLocaleString()
    };

    renderReporte();
}

function renderReporte(){
    let html = `
    <b>📅 Fecha:</b> ${reporteData.fecha}<br><br>
    <b>🎯 Objetivo:</b> ${reporteData.objetivo}<br><br>

    <b>⚠️ Vulnerabilidades:</b><br>
    ${reporteData.vulnerabilidades.map(v => `- ${v.nombre}`).join("<br>")}
    <br><br>

    <b>📊 Riesgo:</b> ${reporteData.riesgo}% (${reporteData.nivel})
    `;

    document.getElementById("reporte").innerHTML = html;
}

function actualizarBarra(){
    let bar = document.getElementById("riskBar");
    bar.style.width = riskValue + "%";
    bar.className = "fill";

    if(riskValue < 40) bar.classList.add("low");
    else if(riskValue < 70) bar.classList.add("medium");
    else bar.classList.add("high");
}

async function pdf(){
    if(!reporteData){
        alert("Primero ejecuta un escaneo");
        return;
    }

    const { jsPDF } = window.jspdf;
    const doc = new jsPDF();

    let y = 15;

    doc.setFont("helvetica", "bold");
    doc.setFontSize(18);
    doc.text("SECURITY SCANNER REPORT", 105, y, { align: "center" });

    y += 8;
    doc.setFontSize(10);
    doc.setFont("helvetica", "normal");
    doc.text(reporteData.fecha, 105, y, { align: "center" });

    y += 10;
    doc.line(10, y, 200, y);

    y += 10;
    doc.setFont("bold");
    doc.text("Objetivo:", 10, y);
    doc.setFont("normal");
    doc.text(reporteData.objetivo, 40, y);

    y += 10;
    doc.setFont("bold");
    doc.text("Vulnerabilidades:", 10, y);

    doc.setFont("normal");
    reporteData.vulnerabilidades.forEach(v=>{
        y += 6;
        doc.text("• " + v.nombre, 15, y);
    });

    y += 10;

    let color = [34,197,94];
    if(reporteData.nivel === "MEDIO") color = [234,179,8];
    if(reporteData.nivel === "ALTO") color = [239,68,68];

    doc.setFont("bold");
    doc.text("Riesgo:", 10, y);

    doc.setTextColor(...color);
    doc.text(`${reporteData.riesgo}% (${reporteData.nivel})`, 40, y);
    doc.setTextColor(0,0,0);

    y += 8;
    doc.setFillColor(220,220,220);
    doc.rect(10, y, 180, 6, "F");

    doc.setFillColor(...color);
    doc.rect(10, y, reporteData.riesgo * 1.8, 6, "F");

    y += 15;
    doc.setFont("bold");
    doc.text("Recomendaciones:", 10, y);

    doc.setFont("normal");

    const recs = [
        "Validar entradas",
        "Actualizar software",
        "Usar headers seguros",
        "Auditorías constantes"
    ];

    recs.forEach(r=>{
        y += 6;
        doc.text("• " + r, 15, y);
    });

    y += 15;
    doc.setFontSize(8);
    doc.text("Generado automáticamente", 105, y, { align: "center" });

    doc.save("reporte_seguridad.pdf");
}
</script>

</body>
</html>
